name: 手动部署文档-self-hosted

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm

      - name: 启用 Corepack 并安装 Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn --version   # 验证 Yarn 版本是否正确

      - name: 安装依赖
        run: yarn install --immutable

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: yarn docs:build

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: page # 部署目标分支
          folder: docs/.vuepress/dist # 构建输出目录
